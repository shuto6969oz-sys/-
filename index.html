<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Centipede</title>

<style>
body{margin:0;background:black;overflow:hidden;-webkit-user-select:none;}
canvas{display:block;}

.controls{
 position:fixed;bottom:100px;width:100%;
 display:flex;justify-content:space-around;
}

button{
 width:140px;height:140px;border-radius:50%;
 border:none;font-size:40px;background:#333;color:white;
}

.debug{
 position:fixed;right:10px;background:#222;color:white;border:none;
 font-size:18px;padding:15px 20px;
}

#nextBtn{top:10px;}
#resetBtn{top:70px;}

#hsReset{
 position:fixed;
 left:5px;
 top:5px;
 font-size:12px;
 padding:5px 8px;
 background:#111;
 color:#888;
 border:none;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
<button id="left">◀</button>
<button id="right">▶</button>
</div>

<button id="nextBtn" class="debug">次</button>
<button id="resetBtn" class="debug">リセット</button>

<button id="hsReset">HS</button>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let state="home";

let player={x:canvas.width/2,y:canvas.height-240,speed:14};

let bullet=null;
let level=1;
let score=0;
let life=4;
let gameOver=false;

let invincible=0;

// ★ポップアップ
let popups=[];

const UI_AREA_HEIGHT = 160;

// ===== ハイスコア =====
let highScore = localStorage.getItem("centipedeHighScore") || 0;

hsReset.onclick=()=>{
    highScore = 0;
    localStorage.setItem("centipedeHighScore", 0);
};

// ===== ランキング =====
function getRank(score){
    if(score <= 10000) return 380;
    if(score <= 20000) return 208;
    if(score <= 30000) return 120;
    if(score <= 40000) return 67;
    if(score <= 50000) return 56;
    if(score <= 60000) return 42;
    if(score <= 70000) return 38;
    if(score <= 80000) return 23;
    if(score <= 90000) return 7;
    return 1;
}

// ===== ポップ生成 =====
function addPopup(x,y,value){
    popups.push({x:x,y:y,value:value,life:48});
}

// ===== 音 =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, time){
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type="sine";
    osc.frequency.value=freq;

    gain.gain.setValueAtTime(0,audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.05,audioCtx.currentTime+0.01);
    gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+time);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime+time);
}

function playShootHit(){ playTone(700,0.08); }
function playDamage(){ playTone(150,0.12); }

function playLevelUp(){
    playTone(400,0.1);
    setTimeout(()=>playTone(700,0.1),100);
    setTimeout(()=>{
        playTone(400,0.1);
        setTimeout(()=>playTone(700,0.1),100);
    },250);
}

// ===== スピード =====
function getCentipedeSpeed(){
    return 3 * Math.pow(2, level-1);
}

// ===== 色 =====
function getColors(){
    if(level===1)return {c:"lime",m:"red"};
    if(level===2)return {c:"pink",m:"cyan"};
    if(level===3)return {c:"red",m:"yellow"};
    if(level===4)return {c:"purple",m:"orange"};
    if(level===5)return {c:"cyan",m:"yellow"};
    if(level===6)return {c:"red",m:"blue"};
    return {c:"white", m:"white"};
}

function getEnemyColor(){
    if(level===1)return "red";
    if(level===2)return "cyan";
    if(level===3)return "yellow";
    if(level===4)return "orange";
    if(level===5)return "yellow";
    if(level===6)return "blue";
    return "white";
}

// ===== センチ =====
let centipedes=[];
function spawnCentipede(){
    let arr=[];
    for(let i=0;i<12;i++){
        arr.push({x:i*48,y:40,dir:1});
    }
    centipedes=[arr];
}

// ===== キノコ =====
let mushrooms=[];
function addMushrooms(num){
    for(let i=0;i<num;i++){
        let y;
        do{
            y=Math.random()*canvas.height*0.7;
        }while(y < UI_AREA_HEIGHT);

        mushrooms.push({
            x:Math.random()*canvas.width,
            y:y,
            hp:4
        });
    }
}

function spawnMush(){
    mushrooms=[];
    addMushrooms(40);
}

// ===== ザコ敵 =====
let enemies=[];
setInterval(()=>{
    if(!gameOver && state==="game"){
        let count=1;
        if(level===3)count=2;
        else if(level>=4)count=3;

        for(let i=0;i<count;i++){
            enemies.push({
                x:Math.random()*canvas.width,
                y:-20,
                speed:1.5
            });
        }
    }
},5000);

// ===== ボタン =====
nextBtn.onclick=()=>{
    level++;
    life++;
    playLevelUp();
    spawnCentipede();
    addMushrooms(10);
};

resetBtn.onclick=()=>{
    state="home";
};

function resetGame(){
    level=1;
    score=0;
    life=4;
    gameOver=false;
    enemies=[];
    spawnCentipede();
    spawnMush();
}

// ===== 入力 =====
let L=false,R=false;
left.ontouchstart=()=>L=true;
left.ontouchend=()=>L=false;
right.ontouchstart=()=>R=true;
right.ontouchend=()=>R=false;

canvas.ontouchstart=()=>{
    if(state==="home"){
        audioCtx.resume();
        state="game";
        resetGame();
        return;
    }
    if(!bullet && !gameOver){
        bullet={x:player.x,y:player.y};
    }
};

function hit(a,b,size){
    return Math.abs(a.x-b.x)<size && Math.abs(a.y-b.y)<size;
}

// ===== 更新 =====
function update(){

    hsReset.style.display = (state==="home") ? "block" : "none";

    if(state!=="game") return;
    if(gameOver) return;

    // ★ポップ更新
    popups.forEach(p=>{
        p.y-=1;
        p.life--;
    });
    popups=popups.filter(p=>p.life>0);

    if(invincible>0) invincible--;

    if(L) player.x-=player.speed;
    if(R) player.x+=player.speed;
    player.x=Math.max(0,Math.min(canvas.width,player.x));

    if(bullet){
        bullet.y-=75;
        if(bullet.y<0) bullet=null;
    }

    let speed=getCentipedeSpeed();

    centipedes.forEach(c=>{
        c.forEach(seg=>{
            seg.x+=seg.dir*speed;

            let wall=seg.x<0||seg.x>canvas.width;
            let mushHit=mushrooms.some(m=>hit(seg,m,45));

            if(wall||mushHit){
                seg.dir*=-1;
                seg.y+=20;
            }

            if(seg.y>canvas.height){
                seg.y=0;
            }

            if(invincible===0 && hit(player,seg,40)){
                life--;
                invincible=180;
                playDamage();

                if(life<=0){
                    gameOver=true;
                    if(score>highScore){
                        highScore=score;
                        localStorage.setItem("centipedeHighScore",highScore);
                    }
                }
            }
        });
    });

    enemies.forEach(e=>e.y+=e.speed);
    enemies=enemies.filter(e=>e.y<canvas.height);

    enemies.forEach(e=>{
        if(invincible===0 && hit(player,e,40)){
            life--;
            invincible=180;
            e.y=-20;
            playDamage();

            if(life<=0){
                gameOver=true;
                if(score>highScore){
                    highScore=score;
                    localStorage.setItem("centipedeHighScore",highScore);
                }
            }
        }
    });

    if(bullet){

        for(let i=mushrooms.length-1;i>=0;i--){
            let m=mushrooms[i];
            if(hit(bullet,m,45)){
                m.hp--;
                bullet=null;
                playShootHit();
                if(m.hp<=0){
                    mushrooms.splice(i,1);
                    score+=100;
                    addPopup(m.x,m.y,100);
                }
                return;
            }
        }

        for(let ci=centipedes.length-1;ci>=0;ci--){
            let c=centipedes[ci];

            for(let si=c.length-1;si>=0;si--){
                let seg=c[si];

                if(hit(bullet,seg,30)){
                    score+=500;
                    addPopup(seg.x,seg.y,500);
                    playShootHit();

                    mushrooms.push({x:seg.x,y:seg.y,hp:4});

                    if(si!==0){
                        let newC=c.slice(si);
                        c.splice(si);
                        newC.forEach(s=>s.dir*=-1);
                        centipedes.push(newC);
                    }else{
                        c.shift();
                    }

                    bullet=null;
                    return;
                }
            }

            if(c.length===0){
                centipedes.splice(ci,1);
            }
        }

        for(let i=enemies.length-1;i>=0;i--){
            let e=enemies[i];
            if(hit(bullet,e,40)){
                enemies.splice(i,1);
                bullet=null;
                score+=300;
                addPopup(e.x,e.y,300);
                playShootHit();
                return;
            }
        }
    }

    if(centipedes.length===0){
        level++;
        life++;
        playLevelUp();
        spawnCentipede();
        addMushrooms(4);
    }
}

// ===== 描画 =====
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(state==="home"){
        ctx.fillStyle="lime";
        ctx.font="80px monospace";
        ctx.textAlign="center";
        ctx.fillText("ムカデゲーム",canvas.width/2,canvas.height/2);

        ctx.fillStyle="white";
        ctx.font="40px monospace";
        ctx.fillText("タップしてプレイ",canvas.width/2,canvas.height/2+100);

        ctx.fillStyle="yellow";
        ctx.fillText("HI SCORE "+highScore,canvas.width/2,canvas.height/2+180);

        ctx.fillStyle="cyan";
        ctx.fillText("RANK "+getRank(highScore)+" 位",canvas.width/2,canvas.height/2+240);

        return;
    }

    let col=getColors();

    ctx.fillStyle="white";
    ctx.font="48px monospace";
    ctx.fillText("LEVEL "+level,20,50);
    ctx.fillText("SCORE "+score,20,100);

    for(let i=0;i<Math.max(0,life-1);i++){
        ctx.fillStyle="red";
        ctx.fillRect(20+i*50,120,40,40);
    }

    let playerColor="cyan";
    if(life===1 && Math.floor(Date.now()/100)%2===0){
        playerColor="white";
    }

    ctx.fillStyle=playerColor;
    ctx.fillRect(player.x-20,player.y-20,40,40);

    if(bullet){
        ctx.fillStyle="yellow";
        ctx.fillRect(bullet.x-4,bullet.y-20,8,20);
    }

    mushrooms.forEach(m=>{
        ctx.fillStyle=col.m;
        ctx.fillRect(m.x-20,m.y-20,40,40);
        ctx.fillStyle=col.c;
        ctx.fillRect(m.x-12,m.y-12,24,24);
    });

    ctx.fillStyle=col.c;
    centipedes.forEach(c=>{
        c.forEach(seg=>{
            ctx.fillRect(seg.x-20,seg.y-20,40,40);
        });
    });

    ctx.fillStyle=getEnemyColor();
    enemies.forEach(e=>{
        ctx.fillRect(e.x-20,e.y-20,40,40);
    });

    // ★ポップ描画
    ctx.font="30px monospace";
    ctx.textAlign="center";
    ctx.fillStyle="yellow";
    popups.forEach(p=>{
        ctx.fillText("+"+p.value,p.x,p.y);
    });

    if(gameOver){
        ctx.fillStyle="red";
        ctx.font="80px monospace";
        ctx.textAlign="center";
        ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2);
        ctx.fillText("SCORE "+score,canvas.width/2,canvas.height/2+100);
        ctx.fillText("リセット押して",canvas.width/2,canvas.height/2+200);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
